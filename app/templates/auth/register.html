<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDMS — Register</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.light-mode {
            background: radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.08), transparent 35%),
                radial-gradient(circle at 80% 0%, rgba(14, 165, 233, 0.08), transparent 30%),
                linear-gradient(135deg, #f8fafc 0%, #e2e8f0 45%, #f5f5f5 100%);
        }


        .register-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .register-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .register-header .icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: linear-gradient(135deg, #10b981, #059669);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #fff;
            font-size: 1.5rem;
        }

        .register-header h1 {
            font-size: 1.5rem;
            color: #1e293b;
        }

        .register-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .btn-register:hover {
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            transform: translateY(-1px);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        .flash-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .flash-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .flash-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link a:hover {
            color: #10b981;
        }

        .role-description {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 0.35rem;
        }
    
        body.light-mode h1, body.light-mode h2, body.light-mode h3, 
        body.light-mode h4, body.light-mode h5, body.light-mode h6,
        body.light-mode .defect-title, body.light-mode .info-value, 
        body.light-mode .count, body.light-mode label, body.light-mode .field-value {
            color: #0f172a !important;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea,
        body.light-mode .coordinates, body.light-mode .defect-id {
            color: #0f172a !important;
            border-color: rgba(0,0,0,0.15) !important;
        }
        body.light-mode .form-group label {
            color: #475569 !important;
        }

    </style>
</head>

<body>
    <script>
      (function() {
        if (!localStorage.getItem('theme-set')) {
          document.body.classList.add('light-mode');
        } else if (localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light-mode');
        }
      })();
    </script>

    <div class="register-card">
        <div class="register-header">
            <div class="icon"><i class="fas fa-user-plus"></i></div>
            <h1>Create New User</h1>
            <p>Add a new inspector or developer</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Min 6 characters" required
                    minlength="6">
            </div>
            <div class="form-group">
                <label for="role"><i class="fas fa-user-tag"></i> Role</label>
                <select id="role" name="role">
                    <option value="inspector">Inspector</option>
                    <option value="developer">Developer</option>
                </select>
                <div class="role-description">
                    <strong>Inspector:</strong> Upload scan files &nbsp;|&nbsp; <strong>Developer:</strong> Full
                    dashboard access
                </div>
            </div>
            <button type="submit" class="btn-register">
                <i class="fas fa-user-plus"></i> Create User
            </button>
        </form>

        <div class="back-link">
            <a href="{{ url_for('developer.dashboard') }}"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
    </div>
</body>

</html>
