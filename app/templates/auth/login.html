<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LDMS — Login</title>
  <meta name="description" content="Sign in to the LiDAR Defect Management System">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-from: #eef1f7;
      --bg-to:   #e4e9f2;
      --surface: #ffffff;
      --ink:     #1a2035;
      --ink-2:   #4b5675;
      --muted:   #8993aa;
      --accent:  #2563eb;
      --accent-h:#1d4ed8;
      --shadow-ring: rgba(37, 99, 235, 0.12);
      --shadow-soft: rgba(37, 99, 235, 0.06);
      --shadow-card:
        rgba(37, 99, 235, 0.10) 0px 0px 0px 1px,
        rgba(37, 99, 235, 0.06) 0px 4px 16px 0px,
        rgba(0, 0, 0, 0.06)    0px 1px 4px  0px;
      --shadow-inset: rgba(0, 0, 0, 0.08) 0px 1px 2px 0px inset;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    .brand-bar {
      text-align: center;
      margin-bottom: 2rem;
    }

    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--accent);
      color: #fff;
      font-size: 1.25rem;
      margin-bottom: 0.85rem;
      box-shadow:
        rgba(37, 99, 235, 0.40) 0px 4px 14px 0px,
        rgba(37, 99, 235, 0.20) 0px 0px 0px 1px;
    }

    .brand-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 2rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 0.4rem;
    }

    .brand-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .login-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2.25rem 2rem 2.5rem;
      box-shadow: var(--shadow-card);
    }

    .card-heading { margin-bottom: 1.75rem; }

    .card-heading h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.35rem;
    }

    .card-heading p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-group { margin-bottom: 1.2rem; }

    .form-group label {
      display: block;
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--ink-2);
      margin-bottom: 0.45rem;
    }

    .form-group input {
      width: 100%;
      padding: 0.7rem 0.875rem;
      border-radius: 10px;
      border: none;
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      color: var(--ink);
      background: #f4f6fb;
      box-shadow:
        var(--shadow-inset),
        rgba(37, 99, 235, 0.14) 0px 0px 0px 1px;
      outline: none;
      transition: box-shadow 0.15s ease;
    }

    .form-group input:focus {
      background: #fff;
      box-shadow:
        var(--shadow-inset),
        rgba(37, 99, 235, 0.45) 0px 0px 0px 2px,
        rgba(37, 99, 235, 0.15) 0px 0px 0px 4px;
    }

    .form-group input::placeholder { color: #b8c0d4; }

    .btn-login {
      width: 100%;
      padding: 0.78rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow:
        rgba(37, 99, 235, 0.45) 0px 4px 14px 0px,
        rgba(255, 255, 255, 0.18) 0px 1px 0px inset;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .btn-login:hover {
      background: var(--accent-h);
      box-shadow: rgba(37, 99, 235, 0.55) 0px 6px 20px 0px;
    }

    .btn-login:active { transform: translateY(1px); }

    .flash-message {
      padding: 0.7rem 0.875rem;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      font-size: 0.8125rem;
      font-weight: 500;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .flash-error {
      background: rgba(220, 38, 38, 0.07);
      color: #b91c1c;
      box-shadow: rgba(220, 38, 38, 0.22) 0px 0px 0px 1px,
                  rgba(220, 38, 38, 0.06) 0px 2px 8px 0px;
    }
    .flash-success {
      background: rgba(5, 150, 105, 0.07);
      color: #065f46;
      box-shadow: rgba(5, 150, 105, 0.22) 0px 0px 0px 1px,
                  rgba(5, 150, 105, 0.06) 0px 2px 8px 0px;
    }

    #ldms-loader {
      display: none; position: fixed; inset: 0; z-index: 99999;
      background: rgba(238, 241, 247, 0.88); backdrop-filter: blur(4px);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
    }
    #ldms-loader.active { display: flex; }
    .loader-spinner {
      width: 34px; height: 34px;
      border: 3px solid rgba(37, 99, 235, 0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loader-text { color: var(--muted); font-weight: 500; font-size: 0.875rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="ldms-loader">
    <div class="loader-spinner"></div>
    <span class="loader-text">Signing in…</span>
  </div>

  <div class="login-wrap">
    <div class="brand-bar">
      <div class="brand-icon"><i class="fas fa-hard-hat"></i></div>
      <div class="brand-name">LDMS</div>
      <div class="brand-subtitle">Lidar Defect Management System</div>
    </div>
    <div class="login-card">
      <div class="card-heading">
        <h1>Welcome back</h1>
        <p>Sign in to your LiDAR Defect Management account</p>
      </div>

      {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
      <div class="flash-message flash-{{ category }}">
        <i class="fas fa-{{ 'exclamation-circle' if category == 'error' else 'check-circle' }}"></i>
        {{ message }}
      </div>
      {% endfor %}
      {% endwith %}

      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn-login" id="sign-in-btn">
          <i class="fas fa-sign-in-alt"></i> Sign in
        </button>
      </form>
    </div>
  </div>

  <script>
    document.querySelectorAll('form').forEach(f =>
      f.addEventListener('submit', () => document.getElementById('ldms-loader').classList.add('active'))
    );
  </script>
</body>
</html>
