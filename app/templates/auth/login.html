<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LDMS — Login</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.light-mode {
            background: radial-gradient(circle at 20% 20%, rgba(124, 58, 237, 0.08), transparent 35%),
                radial-gradient(circle at 80% 0%, rgba(14, 165, 233, 0.08), transparent 30%),
                linear-gradient(135deg, #f8fafc 0%, #e2e8f0 45%, #f5f5f5 100%);
        }


        .login-card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .icon {
            width: 60px;
            height: 60px;
            border-radius: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            color: #fff;
            font-size: 1.5rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            color: #1e293b;
        }

        .login-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #334155;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: box-shadow 0.2s, transform 0.1s;
        }

        .btn-login:hover {
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .flash-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
        }

        .flash-error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .flash-success {
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 0.875rem;
        }

        .back-link a:hover {
            color: #3b82f6;
        }

        /* Loading overlay */
        #ldms-loader {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: rgba(11, 16, 32, 0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        #ldms-loader.active {
            display: flex;
        }

        .loader-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: ldms-spin 0.8s linear infinite;
        }

        .loader-text {
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.9rem;
        }

        @keyframes ldms-spin {
            to {
                transform: rotate(360deg);
            }
        }
    
        body.light-mode h1, body.light-mode h2, body.light-mode h3, 
        body.light-mode h4, body.light-mode h5, body.light-mode h6,
        body.light-mode .defect-title, body.light-mode .info-value, 
        body.light-mode .count, body.light-mode label, body.light-mode .field-value {
            color: #0f172a !important;
        }
        body.light-mode input, body.light-mode select, body.light-mode textarea,
        body.light-mode .coordinates, body.light-mode .defect-id {
            color: #0f172a !important;
            border-color: rgba(0,0,0,0.15) !important;
        }
        body.light-mode .form-group label {
            color: #475569 !important;
        }

    </style>
</head>

<body>
    <script>
      (function() {
        if (!localStorage.getItem('theme-set')) {
          document.body.classList.add('light-mode');
        } else if (localStorage.getItem('theme') === 'light') {
          document.body.classList.add('light-mode');
        }
      })();
    </script>

    <div id="ldms-loader">
        <div class="loader-spinner"></div>
        <span class="loader-text">Signing in...</span>
    </div>
    <div class="login-card">
        <div class="login-header">
            <div class="icon"><i class="fas fa-shield-halved"></i></div>
            <h1>LDMS Login</h1>
            <p>LIDAR Defect Management System</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endwith %}

        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-login">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
    </div>
    <script>
        document.querySelectorAll('form').forEach(f => f.addEventListener('submit', () => document.getElementById('ldms-loader').classList.add('active')));
    </script>
</body>

</html>
