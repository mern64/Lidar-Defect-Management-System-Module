services:

  # ─────────────────────────────────────────
  # Flask Application
  # ─────────────────────────────────────────
  flask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_app
    env_file:
      - .env                          # Load secrets from .env (not committed to git)
    environment:
      - PYTHONPATH=/usr/src/app
      - FLASK_APP=app
      - FLASK_ENV=development         # Set to 'production' for prod deployment
      - DATABASE_URL=postgresql://pcd_user:pcd_password@flask_db:5432/pcd_db
    ports:
      - "5100:5000"                   # Access app at http://localhost:5100
    volumes:
      - ./:/usr/src/app               # Live reload in development
    command: >
      sh -c "python -c 'from app import create_app; app = create_app()' &&
             gunicorn --bind 0.0.0.0:5000 --workers 2 --worker-class gthread --threads 4 --timeout 300 --graceful-timeout 60 --keep-alive 10 --max-requests 1000 --max-requests-jitter 100 --log-level info --access-logfile - --error-logfile - 'app:create_app()'"
    restart: unless-stopped
    depends_on:
      flask_db:
        condition: service_healthy    # Wait for Postgres to be ready

  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  flask_db:
    image: postgres:16
    container_name: flask_db
    environment:
      POSTGRES_USER: pcd_user
      POSTGRES_PASSWORD: pcd_password
      POSTGRES_DB: pcd_db
    ports:
      - "5432:5432"
    volumes:
      - flask_db_data:/var/lib/postgresql/data    # Correct path with /data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pcd_user -d pcd_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  flask_db_data:                      # Persistent storage — survives container restarts
